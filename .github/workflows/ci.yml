name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  node-checks:
    name: Node.js checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck contracts
        run: pnpm --filter @idea2real/contracts typecheck

      - name: Test contracts
        run: pnpm --filter @idea2real/contracts test

      - name: Typecheck API
        run: pnpm --filter @idea2real/api typecheck

      - name: Test API
        run: pnpm --filter @idea2real/api test

      - name: Typecheck web
        run: pnpm --filter @idea2real/web typecheck

      - name: Test web
        run: pnpm --filter @idea2real/web test

  geometry-checks:
    name: Geometry service (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install geometry deps
        working-directory: services/geometry
        run: pip install -e ".[dev]"

      - name: Lint geometry
        working-directory: services/geometry
        run: ruff check .

      - name: Test geometry
        working-directory: services/geometry
        run: pytest tests/ -v

  python-legacy:
    name: Legacy Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint scripts and tests
        run: flake8 scripts/ tests/ --max-line-length=100 --exclude=vendor,vendor/blender-mcp

      - name: Run legacy tests
        run: |
          pip install pytest pyyaml requests
          pytest tests/ -v --ignore=vendor --ignore=vendor/blender-mcp
