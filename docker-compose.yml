services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: idea2real
      POSTGRES_USER: idea2real
      POSTGRES_PASSWORD: idea2real
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idea2real -d idea2real"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  lint:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - .:/workspace:ro
    command: >
      sh -c "pip install --quiet flake8 &&
             flake8 scripts/ tests/ --max-line-length=100 --exclude=vendor,vendor/blender-mcp"

  test:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      sh -c "pip install --quiet pytest pyyaml requests &&
             pytest tests/ -v --ignore=vendor --ignore=vendor/blender-mcp"

volumes:
  postgres_data:
  redis_data:
  minio_data:
